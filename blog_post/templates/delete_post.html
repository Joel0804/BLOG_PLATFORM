{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Post</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <nav class="navbar">
        <a href="{% url 'home' %}" class="nav-brand">My Blog</a>
    </nav>
    <div class="form-container">
        <div class="form-header">
            <h3>Delete Post</h3>
        </div>
        <p style="text-align:center; margin-bottom: 1rem; color: #666;">Are you sure you want to delete "{{ post.title }}"?</p>
        <form method="POST">
            {% csrf_token %}
            <div class="botton">
                <button class="submit" type="submit">Yes, Delete</button>
            </div>
            <div class="signup">
                <a href="{% url 'home' %}">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
